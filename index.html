# Website designed by ChatGPT to add cleaner visuals to the project 
# How to start the server: python -m http.server 8000
# Where to play the game: http://localhost:8000
<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe — Dice Edition</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: #0d0d1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e0e0ff;
    }
    #app { width: 100%; max-width: 560px; padding: 30px 20px; }

    .title { text-align: center; font-size: 28px; letter-spacing: 8px; color: #fff; text-transform: uppercase; margin-bottom: 4px; }
    .subtitle { text-align: center; font-size: 11px; letter-spacing: 4px; color: #555; margin-bottom: 24px; }

    .scoreboard { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; }
    .score-box { background: #16162a; border: 1px solid #333; border-radius: 8px; padding: 10px 20px; text-align: center; min-width: 90px; }
    .score-label { font-size: 10px; letter-spacing: 3px; color: #666; margin-bottom: 4px; }
    .score-val { font-size: 28px; font-weight: bold; }
    .score-box.x .score-val { color: #ff5555; }
    .score-box.o .score-val { color: #55aaff; }
    .score-box.d .score-val { color: #aaa; }

    .board-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
    .board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 8px; }
    .cell {
      width: 100px; height: 100px;
      background: #16162a; border: 1px solid #2a2a4a; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; font-weight: bold; cursor: default;
      transition: all 0.15s; user-select: none;
    }
    .cell.clickable { cursor: pointer; }
    .cell.clickable:hover { transform: scale(1.05); background: #1e1e3a; }
    .cell.x-cell { color: #ff5555; border-color: #ff555533; }
    .cell.o-cell { color: #55aaff; border-color: #55aaff33; }
    .cell.highlight-place { border-color: #55ff88; background: #162a1e; }
    .cell.highlight-remove-opp { border-color: #ff5555; background: #2a1616; animation: pulse-red 1s infinite; }
    .cell.highlight-remove-self { border-color: #ffaa00; background: #2a1e00; animation: pulse-amber 1s infinite; }
    @keyframes pulse-red   { 0%,100%{box-shadow:0 0 0 0 #ff555544} 50%{box-shadow:0 0 0 8px #ff555522} }
    @keyframes pulse-amber { 0%,100%{box-shadow:0 0 0 0 #ffaa0044} 50%{box-shadow:0 0 0 8px #ffaa0022} }

    .msg-box {
      background: #16162a; border: 1px solid #333; border-radius: 12px;
      padding: 16px 22px; margin: 0 auto 20px; text-align: center;
    }
    .msg-who { font-size: 11px; letter-spacing: 3px; color: #666; margin-bottom: 6px; }
    .msg-what { font-size: 15px; color: #ddd; line-height: 1.6; }

    .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 18px; }
    .btn {
      padding: 11px 24px; border-radius: 8px; border: 1px solid;
      cursor: pointer; font-family: 'Courier New', monospace;
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      transition: all 0.15s; background: transparent;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }
    .btn.green  { border-color: #55ff88; color: #55ff88; }
    .btn.green:hover  { background: #55ff8822; }
    .btn.blue   { border-color: #55aaff; color: #55aaff; }
    .btn.blue:hover   { background: #55aaff22; }
    .btn.red    { border-color: #ff5555; color: #ff5555; }
    .btn.red:hover    { background: #ff555522; }
    .btn.amber  { border-color: #ffaa00; color: #ffaa00; }
    .btn.amber:hover  { background: #ffaa0022; }
    .btn.gray   { border-color: #555; color: #aaa; }
    .btn.gray:hover   { background: #55555522; }

    .dice-grid { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    .dice-card {
      background: #16162a; border: 1px solid #333; border-radius: 12px;
      padding: 16px 18px; cursor: pointer; transition: all 0.15s;
      width: 148px; text-align: center;
    }
    .dice-card:hover { border-color: #555; background: #1e1e3a; transform: translateY(-2px); }
    .dice-card .d-num  { font-size: 30px; margin-bottom: 6px; }
    .dice-card .d-name { font-size: 11px; letter-spacing: 3px; color: #aaa; margin-bottom: 8px; }
    .dice-card .d-desc { font-size: 10px; color: #666; line-height: 1.5; }
    .dice-card.d1 .d-num { color: #55ff88; }
    .dice-card.d2 .d-num { color: #ffaa00; }
    .dice-card.d3 .d-num { color: #ff5555; }

    .dice-display { text-align: center; margin: 8px 0 12px; }
    .dice-face { font-size: 56px; display: inline-block; animation: bounceIn 0.3s ease; }
    @keyframes bounceIn { 0%{transform:scale(0.4);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }

    .effect-tag {
      display: inline-block; padding: 4px 12px; border-radius: 4px;
      font-size: 11px; letter-spacing: 2px; margin-bottom: 10px;
    }
    .effect-tag.remove-opp  { background: #ff555522; color: #ff8888; border: 1px solid #ff555544; }
    .effect-tag.remove-self { background: #ffaa0022; color: #ffcc66; border: 1px solid #ffaa0044; }
    .effect-tag.place       { background: #55ff8822; color: #88ffaa; border: 1px solid #55ff8844; }

    .winner-banner { text-align: center; padding: 10px 0 20px; }
    .win-text { font-size: 34px; letter-spacing: 6px; font-weight: bold; margin-bottom: 10px; }
    .win-text.x-win { color: #ff5555; }
    .win-text.o-win { color: #55aaff; }
    .win-text.draw  { color: #aaa; }

    .hint { font-size: 11px; color: #444; text-align: center; margin-top: 12px; letter-spacing: 1px; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  const DICE_FACES = ['', '⚀','⚁','⚂','⚃','⚄','⚅'];

  // ── Dice logic (ported from dice.py) ──────────────────────────────────────

  function rollDice(num) {
    if (num === 1) return Math.floor(Math.random() * 6) + 1;
    if (num === 2) return [1, 2, 5, 6][Math.floor(Math.random() * 4)];
    return Math.random() < 0.5 ? 1 : 6;
  }

  function getDiceEffect(roll) {
    if (roll === 1) return 'remove_opp';
    if (roll === 6) return 'remove_self';
    return 'place';
  }

  // ── Board logic (ported from main.py) ─────────────────────────────────────

  function checkWinner(board, p) {
    for (let r = 0; r < 3; r++)
      if (board[r][0] === p && board[r][1] === p && board[r][2] === p) return true;
    for (let c = 0; c < 3; c++)
      if (board[0][c] === p && board[1][c] === p && board[2][c] === p) return true;
    if (board[0][0] === p && board[1][1] === p && board[2][2] === p) return true;
    if (board[0][2] === p && board[1][1] === p && board[2][0] === p) return true;
    return false;
  }

  function isDraw(board) {
    return board.every(row => row.every(c => c !== ' '));
  }

  function hasPieces(board, marker) {
    return board.some(row => row.some(c => c === marker));
  }

  function emptyBoard() {
    return [[' ', ' ', ' '], [' ', ' ', ' '], [' ', ' ', ' ']];
  }

  // ── Game state ─────────────────────────────────────────────────────────────

  const state = {
    phase: 'setup_X',   // setup_X | setup_O | choose_action | rolling | remove_opp | remove_self | place | game_over
    board: emptyBoard(),
    player: 'X',
    dice: { X: null, O: null },
    scores: { X: 0, O: 0, D: 0 },
    roll: null,
    effect: null,
    fallback: ''
  };

  function opponent() { return state.player === 'X' ? 'O' : 'X'; }
  function pColor(p)  { return p === 'X' ? '#ff5555' : '#55aaff'; }
  function diceIcon(n) { return ['⚀', '⚃', '⚅'][n - 1]; }

  // ── Actions ────────────────────────────────────────────────────────────────

  function pickDice(num) {
    state.dice[state.phase === 'setup_X' ? 'X' : 'O'] = num;
    state.phase = state.phase === 'setup_X' ? 'setup_O' : 'choose_action';
    render();
  }

  function doRoll() {
    const roll = rollDice(state.dice[state.player]);
    const effect = getDiceEffect(roll);
    state.roll = roll;
    state.effect = effect;
    state.phase = 'rolling';
    render();
  }

  function confirmRoll() {
    const { effect } = state;
    state.fallback = '';
    if (effect === 'remove_opp') {
      if (hasPieces(state.board, opponent())) { state.phase = 'remove_opp'; }
      else { state.fallback = `No ${opponent()} pieces on the board — place yours instead!`; state.phase = 'place'; }
    } else if (effect === 'remove_self') {
      if (hasPieces(state.board, state.player)) { state.phase = 'remove_self'; }
      else { state.fallback = `No ${state.player} pieces to remove — place instead!`; state.phase = 'place'; }
    } else {
      state.phase = 'place';
    }
    render();
  }

  function doPlace() {
    state.phase = 'place';
    state.fallback = '';
    render();
  }

  function cellClick(r, c) {
    const b = state.board.map(row => [...row]);

    if (state.phase === 'place') {
      if (b[r][c] !== ' ') return;
      b[r][c] = state.player;
      finishTurn(b);

    } else if (state.phase === 'remove_opp') {
      if (b[r][c] !== opponent()) return;
      b[r][c] = ' ';
      finishTurn(b);

    } else if (state.phase === 'remove_self') {
      if (b[r][c] !== state.player) return;
      b[r][c] = ' ';
      finishTurn(b);
    }
  }

  function finishTurn(newBoard) {
    state.board = newBoard;
    if (checkWinner(newBoard, state.player)) {
      state.scores[state.player]++;
      state.phase = 'game_over';
      state.effect = 'win';
      render(); return;
    }
    if (isDraw(newBoard)) {
      state.scores.D++;
      state.phase = 'game_over';
      state.effect = 'draw';
      render(); return;
    }
    state.player = opponent();
    state.phase = 'choose_action';
    state.roll = null;
    state.effect = null;
    state.fallback = '';
    render();
  }

  function playAgain() {
    state.board = emptyBoard();
    state.player = 'X';
    state.phase = 'choose_action';
    state.roll = null;
    state.effect = null;
    state.fallback = '';
    render();
  }

  function fullReset() {
    state.board = emptyBoard();
    state.player = 'X';
    state.dice = { X: null, O: null };
    state.scores = { X: 0, O: 0, D: 0 };
    state.phase = 'setup_X';
    state.roll = null;
    state.effect = null;
    state.fallback = '';
    render();
  }

  // ── Render ─────────────────────────────────────────────────────────────────

  function render() {
    const { phase, board, player, dice, scores, roll, effect, fallback } = state;
    const opp = opponent();
    const pc = pColor(player);

    let html = `
      <div class="title">Tic Tac Toe</div>
      <div class="subtitle">with dice power-ups</div>
      <div class="scoreboard">
        <div class="score-box x"><div class="score-label">PLAYER X</div><div class="score-val">${scores.X}</div></div>
        <div class="score-box d"><div class="score-label">DRAWS</div><div class="score-val">${scores.D}</div></div>
        <div class="score-box o"><div class="score-label">PLAYER O</div><div class="score-val">${scores.O}</div></div>
      </div>`;

    // ── Dice setup screens ──
    if (phase === 'setup_X' || phase === 'setup_O') {
      const sp = phase === 'setup_X' ? 'X' : 'O';
      html += `
        <div class="msg-box">
          <div class="msg-who">PLAYER <span style="color:${pColor(sp)}">${sp}</span> — CHOOSE YOUR DICE</div>
          <div class="msg-what">Pick your risk level. Higher = more chaos.</div>
        </div>
        <div class="dice-grid">
          <div class="dice-card d1" onclick="pickDice(1)">
            <div class="d-num">⚀</div>
            <div class="d-name">DICE 1</div>
            <div class="d-desc">~17% remove opp<br>~17% remove self<br>~66% place normally</div>
          </div>
          <div class="dice-card d2" onclick="pickDice(2)">
            <div class="d-num">⚃</div>
            <div class="d-name">DICE 2</div>
            <div class="d-desc">25% remove opp<br>25% remove self<br>50% place normally</div>
          </div>
          <div class="dice-card d3" onclick="pickDice(3)">
            <div class="d-num">⚅</div>
            <div class="d-name">DICE 3</div>
            <div class="d-desc">50% remove opp<br>50% remove self<br>no safe roll!</div>
          </div>
        </div>`;
    }

    // ── Board ──
    if (phase !== 'setup_X' && phase !== 'setup_O') {
      html += `<div class="board-wrap"><div class="board">`;
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 3; c++) {
          const cell = board[r][c];
          let cls = 'cell';
          let clickable = false;
          if (phase === 'place'        && cell === ' ')     { cls += ' highlight-place clickable';       clickable = true; }
          if (phase === 'remove_opp'   && cell === opp)     { cls += ' highlight-remove-opp clickable';  clickable = true; }
          if (phase === 'remove_self'  && cell === player)  { cls += ' highlight-remove-self clickable'; clickable = true; }
          if (cell === 'X') cls += ' x-cell';
          if (cell === 'O') cls += ' o-cell';
          html += `<div class="${cls}" ${clickable ? `onclick="cellClick(${r},${c})"` : ''}>${cell === ' ' ? '' : cell}</div>`;
        }
      }
      html += `</div></div>`;
    }

    // ── Phase-specific UI ──

    if (phase === 'game_over') {
      const isWin = effect === 'win';
      html += `
        <div class="winner-banner">
          <div class="win-text ${isWin ? player.toLowerCase() + '-win' : 'draw'}">
            ${isWin ? 'PLAYER ' + player + ' WINS!' : "IT'S A DRAW!"}
          </div>
          <div class="btns">
            <button class="btn green" onclick="playAgain()">PLAY AGAIN</button>
            <button class="btn gray"  onclick="fullReset()">RESET ALL</button>
          </div>
        </div>`;
    }

    if (phase === 'choose_action') {
      html += `
        <div class="msg-box">
          <div class="msg-who">PLAYER <span style="color:${pc}">${player}</span>'S TURN</div>
          <div class="msg-what">Dice ${diceIcon(dice[player])} equipped. What will you do?</div>
        </div>
        <div class="btns">
          <button class="btn blue"  onclick="doRoll()">ROLL DICE ${diceIcon(dice[player])}</button>
          <button class="btn green" onclick="doPlace()">PLACE PIECE</button>
        </div>`;
    }

    if (phase === 'rolling' && roll !== null) {
      let tagClass, tagText, desc;
      if (effect === 'remove_opp') {
        tagClass = 'remove-opp';  tagText = 'REMOVE OPPONENT';
        desc = `Remove one of <span style="color:${pColor(opp)}">${opp}</span>'s pieces from the board.`;
      } else if (effect === 'remove_self') {
        tagClass = 'remove-self'; tagText = 'REMOVE YOUR OWN';
        desc = `Remove one of your own pieces from the board.`;
      } else {
        tagClass = 'place';       tagText = 'PLACE NORMALLY';
        desc = `No special effect — place your piece as normal.`;
      }
      const btnClass = effect === 'remove_opp' ? 'red' : effect === 'remove_self' ? 'amber' : 'green';
      html += `
        <div class="msg-box">
          <div class="msg-who">PLAYER <span style="color:${pc}">${player}</span> ROLLED</div>
          <div class="dice-display"><span class="dice-face">${DICE_FACES[roll]}</span></div>
          <div style="margin-bottom:8px"><span class="effect-tag ${tagClass}">${tagText}</span></div>
          <div class="msg-what">${desc}</div>
        </div>
        <div class="btns">
          <button class="btn ${btnClass}" onclick="confirmRoll()">CONTINUE →</button>
        </div>`;
    }

    if (phase === 'place') {
      html += `
        <div class="msg-box">
          <div class="msg-who">PLAYER <span style="color:${pc}">${player}</span></div>
          <div class="msg-what">Click a glowing cell to place your piece.
            ${fallback ? `<br><span style="color:#ffaa66;font-size:13px">${fallback}</span>` : ''}
          </div>
        </div>`;
    }

    if (phase === 'remove_opp') {
      html += `
        <div class="msg-box">
          <div class="msg-who">PLAYER <span style="color:${pc}">${player}</span></div>
          <div class="msg-what" style="color:#ff8888">
            Click one of <span style="color:${pColor(opp)}">${opp}</span>'s pieces to remove it.
          </div>
        </div>`;
    }

    if (phase === 'remove_self') {
      html += `
        <div class="msg-box">
          <div class="msg-who">PLAYER <span style="color:${pc}">${player}</span></div>
          <div class="msg-what" style="color:#ffcc66">Click one of your own pieces to remove it.</div>
        </div>`;
    }

    if (phase !== 'setup_X' && phase !== 'setup_O' && phase !== 'game_over') {
      html += `<div class="hint">X: Dice ${dice.X ? diceIcon(dice.X) : '?'} &nbsp;|&nbsp; O: Dice ${dice.O ? diceIcon(dice.O) : '?'}</div>`;
    }

    document.getElementById('app').innerHTML = html;
  }

  render();
</script>
</body>
</html>
